<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex!!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen p-6">


<img src="img/pokebola.png" alt="Pokébola" class="pokebola-esquina">


  <svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="turbulencia" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.08" numOctaves="2" seed="3" result="noise">
        <animate attributeName="seed" values="1;9;1" dur="1.2s" repeatCount="indefinite" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>


  <div class="contenido-principal">

  <h1 class="text-3xl font-bold text-center text-slate-800 mb-6">Pokédex</h1>
 <div class="max-w-md mx-auto flex gap-2 mb-6">
  <input id="buscador" type="text" placeholder="Busca un Pokémon (ej. charizard)"
         class="flex-1 p-2 rounded-lg border border-slate-300">
  <button id="btn-buscar" class="px-4 py-2 bg-yellow-400 font-semibold rounded-lg hover:bg-yellow-500">
    Buscar
  </button>
</div>

<div id="mensaje" class="hidden text-center text-red-600 font-medium my-4"></div>
<div id="spinner" class="hidden text-center text-slate-500 my-4">Cargando…</div>



  <!--  -->
  <div id="resultado" class="grid grid-cols-2 md:grid-cols-3 gap-4 max-w-4xl mx-auto"></div>
  

  <div class="text-center my-6">
  <button id="cargar-mas" class="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-800">
    Cargar más
  </button>
</div>

  </div>


  <script src="js/app.js"></script>
</body>
</html>
